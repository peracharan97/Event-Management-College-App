# ===============================
# Server Configuration
# ===============================
server.port=8080
server.address=0.0.0.0
spring.application.name=PVPSIT QR Event Manager
spring.config.import=optional:file:./.env[.properties],optional:file:./QREventManager/.env[.properties]

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/event_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:LOCAL_DEV_JWT_SECRET_CHANGE_IN_PROD_12345678901234567890}
jwt.expiration=86400000

# ===============================
# Razorpay Configuration
# ===============================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.currency=INR

# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# CORS Configuration
# ===============================
cors.allowed.origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173

# ===============================
# QR Code Configuration
# ===============================
qr.code.size=300
qr.code.format=PNG

# ===============================
# Logging
# ===============================
logging.level.root=ERROR
logging.level.com.pvpsit=ERROR
logging.level.org.springframework.security=ERROR
